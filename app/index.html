<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quotes</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; color: #eee; }
    .card { max-width: 600px; padding: 2rem; text-align: center; }
    .brand-icon { font-size: 4rem; line-height: 1; margin-bottom: 0.5rem; }
    .tenant-badge { font-size: 0.85rem; color: var(--brand-color, #888); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--brand-color, transparent); display: inline-block; }
    blockquote { font-size: 1.5rem; font-style: italic; margin: 0 0 1rem; }
    cite { color: #aaa; }
    button { margin-top: 1.5rem; padding: 0.6rem 1.5rem; background: var(--brand-color, #e94560); border: none; color: #1a1a2e; font-weight: 600; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: filter 0.15s; }
    button:hover { filter: brightness(1.1); }
    footer { margin-top: 2rem; font-size: 0.75rem; color: #555; }
    .watermark { position: fixed; bottom: 1rem; right: 1rem; font-size: 0.75rem; color: #ff9800; letter-spacing: 0.2em; padding: 0.3rem 0.6rem; border: 1px solid #ff9800; border-radius: 4px; }
    .maintenance { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #2c1810; color: #ffb74d; text-align: center; padding: 2rem; z-index: 100; }
    .maintenance h1 { font-size: 3rem; margin: 0 0 1rem; letter-spacing: 0.05em; }
    .maintenance p { font-size: 1.25rem; max-width: 600px; margin: 0; }
    .maintenance .icon { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-icon" id="brandIcon"></div>
    <div class="tenant-badge" id="tenant"></div>
    <blockquote id="quote"></blockquote>
    <cite id="author"></cite>
    <br>
    <button onclick="next()">Next quote</button>
    <footer id="version"></footer>
  </div>
  <div class="watermark" id="watermark" style="display: none"></div>
  <div class="maintenance" id="maintenance" style="display: none">
    <div class="icon">🚧</div>
    <h1>BE RIGHT BACK</h1>
    <p id="maintenanceMessage"></p>
  </div>
  <script>
    const quotes = [
      // comedy
      { q: "I'm not a vegetarian because I love animals; I'm a vegetarian because I hate plants.", a: "A. Whitney Brown", mood: "comedy" },
      { q: "I haven't slept for ten days, because that would be too long.", a: "Mitch Hedberg", mood: "comedy" },
      { q: "Don't sweat the petty things and don't pet the sweaty things.", a: "George Carlin", mood: "comedy" },
      { q: "I love deadlines. I love the whooshing noise they make as they go by.", a: "Douglas Adams", mood: "comedy" },
      { q: "I always wanted to be somebody, but now I realise I should have been more specific.", a: "Lily Tomlin", mood: "comedy" },

      // silicon-valley
      { q: "If it hurts, do it more frequently, and bring the pain forward.", a: "Jez Humble", mood: "silicon-valley" },
      { q: "The goal is to deploy so often that deployment becomes boring.", a: "Charity Majors", mood: "silicon-valley" },
      { q: "The best way to predict the future is to invent it.", a: "Alan Kay", mood: "silicon-valley" },
      { q: "Move fast and break things.", a: "Mark Zuckerberg", mood: "silicon-valley" },
      { q: "Your margin is my opportunity.", a: "Jeff Bezos", mood: "silicon-valley" },
      { q: "First, solve the problem. Then, write the code.", a: "John Johnson", mood: "silicon-valley" },
      { q: "Continuous delivery is not a technology problem. It's an organizational one.", a: "Jez Humble", mood: "silicon-valley" },

      // stoic
      { q: "A person is like a slit through which the energy of the universe becomes aware of itself.", a: "Alan Watts", mood: "stoic" },
      { q: "You have power over your mind — not outside events. Realize this, and you will find strength.", a: "Marcus Aurelius", mood: "stoic" },
      { q: "We suffer more often in imagination than in reality.", a: "Seneca", mood: "stoic" },
      { q: "It is not what happens to you, but how you react to it that matters.", a: "Epictetus", mood: "stoic" },
      { q: "The impediment to action advances action. What stands in the way becomes the way.", a: "Marcus Aurelius", mood: "stoic" },
    ];

    let cfg = { tenant: "", mood: "", icon: "", color: "", watermark: "", maintenance: "" };
    let pool = quotes;
    let i = 0;

    function next() {
      i = (i + 1) % pool.length;
      render();
    }
    function render() {
      document.getElementById("quote").textContent = `“${pool[i].q}”`;
      document.getElementById("author").textContent = `— ${pool[i].a}`;
    }

    fetch("/config.json")
      .then(r => r.json())
      .then(c => { cfg = c; })
      .catch(() => { /* no config — show all quotes */ })
      .finally(() => {
        if (cfg.maintenance) {
          // Maintenance overlay covers the rest of the page; nothing else to render.
          document.getElementById("maintenanceMessage").textContent = cfg.maintenance;
          document.getElementById("maintenance").style.display = "flex";
          return;
        }
        if (cfg.color) document.documentElement.style.setProperty("--brand-color", cfg.color);
        if (cfg.icon) document.getElementById("brandIcon").textContent = cfg.icon;
        if (cfg.mood) pool = quotes.filter(q => q.mood === cfg.mood);
        if (pool.length === 0) pool = quotes; // fallback if mood matches nothing
        i = Math.floor(Math.random() * pool.length);
        if (cfg.tenant) document.getElementById("tenant").textContent = cfg.tenant;
        if (cfg.watermark) {
          const wm = document.getElementById("watermark");
          wm.textContent = cfg.watermark;
          wm.style.display = "block";
        }
        document.getElementById("version").textContent = `v${window.APP_VERSION || "dev"}`;
        render();
      });
  </script>
</body>
</html>
