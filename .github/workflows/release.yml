name: CI / Octopus Release

# Three call paths:
#   1. workflow_call from build.yml — app code changed; build passes its
#      version + sha directly. No GHCR querying, no version-reset races.
#   2. push to main on .octopus/** — process / variables changed; we resolve
#      the latest existing image from GHCR (no new image to pin to).
#   3. workflow_dispatch — manual; either the operator passes a version or
#      we fall back to the GHCR-latest resolution like (2).

on:
  workflow_call:
    inputs:
      version:
        description: "Image tag to release (e.g. 1.0.42). Required from build.yml."
        type: string
        required: true
      sha:
        description: "Commit SHA the release pins to (used as Octopus git_ref)."
        type: string
        required: true
  push:
    branches: [main]
    paths:
      - '.octopus/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to release. Defaults to most-recent GHCR tag."
        type: string
        required: false

env:
  OCTOPUS_SPACE: "IaC Sandbox"
  PROJECT: randomquotes

jobs:
  resolve:
    name: Resolve image version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
      short_sha: ${{ steps.v.outputs.short_sha }}
    steps:
      - name: Pick version + sha
        id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Inputs win when set (workflow_call always sets them; dispatch
          # may); otherwise fall back to GHCR's most-recent non-latest tag.
          INPUT_VERSION="${{ inputs.version }}"
          INPUT_SHA="${{ inputs.sha }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(gh api "/users/${{ github.repository_owner }}/packages/container/octopus-iac-lab/versions" \
              --jq '[.[].metadata.container.tags // [] | .[]] | map(select(. != "latest")) | sort_by(.) | reverse | .[0]' \
              || true)
            [ -n "$VERSION" ] && [ "$VERSION" != "null" ] || { echo "no non-latest image versions in GHCR — has the build job run yet?"; exit 1; }
          fi

          SHA="${INPUT_SHA:-${{ github.sha }}}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION at sha $SHA"

  release:
    name: Release → ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: resolve
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: SaaS
            url_secret: OCTOPUS_SAAS_URL
            key_secret: OCTOPUS_SAAS_API_KEY
            allow_failure: false
          - target: Local
            url_secret: OCTOPUS_LOCAL_URL
            key_secret: OCTOPUS_LOCAL_API_KEY
            allow_failure: true
    env:
      OCTOPUS_URL: ${{ secrets[matrix.url_secret] }}
      OCTOPUS_API_KEY: ${{ secrets[matrix.key_secret] }}
      IMAGE_TAG: ${{ needs.resolve.outputs.version }}
      RELEASE_NUMBER: ${{ needs.resolve.outputs.version }}-${{ needs.resolve.outputs.short_sha }}
    steps:
      - name: Create release
        uses: OctopusDeploy/create-release-action@v3
        with:
          project: ${{ env.PROJECT }}
          release_number: ${{ env.RELEASE_NUMBER }}
          git_ref: ${{ needs.resolve.outputs.sha }}
          packages: |
            randomquotes-image:${{ env.IMAGE_TAG }}

      # Deploy fans out across every tenant carrying the `app/randomquotes`
      # tag — Octopus resolves the set; CI doesn't enumerate. Add a tenant
      # in HCL with that tag and the next pipeline picks it up automatically.
      # Tenanted deploys use a different action; `environment` is singular
      # there, and `tenant_tags` is supported.
      - name: Deploy to Dev
        uses: OctopusDeploy/deploy-release-tenanted-action@v3
        with:
          project: ${{ env.PROJECT }}
          release_number: ${{ env.RELEASE_NUMBER }}
          environment: Dev
          tenant_tags: app/randomquotes
