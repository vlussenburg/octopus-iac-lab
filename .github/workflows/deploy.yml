name: CI / Octopus Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  OCTOPUS_SPACE: iac-sandbox
  IMAGE: ghcr.io/${{ github.repository_owner }}/octopus-iac-lab
  PROJECT: randomquotes

jobs:
  validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz && sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: kubeconform -strict -summary app/k8s/

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: VERSION=${{ steps.version.outputs.version }}

  release:
    name: Release → ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    # Local target is allowed to fail (the tunnel may be down). SaaS isn't.
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: SaaS
            url: ${{ secrets.OCTOPUS_SAAS_URL }}
            api_key: ${{ secrets.OCTOPUS_SAAS_API_KEY }}
            allow_failure: false
          - target: Local
            url: ${{ secrets.OCTOPUS_LOCAL_URL }}
            api_key: ${{ secrets.OCTOPUS_LOCAL_API_KEY }}
            allow_failure: true
    env:
      OCTOPUS_URL: ${{ matrix.url }}
      OCTOPUS_API_KEY: ${{ matrix.api_key }}
    steps:
      # Skip cleanly if the local secrets aren't set — typical when the
      # cloudflared tunnel isn't running and the user hasn't bothered to
      # populate the local secrets yet.
      - name: Skip if URL is unset
        if: matrix.url == ''
        run: |
          echo "::warning::OCTOPUS_${{ matrix.target == 'Local' && 'LOCAL' || 'SAAS' }}_URL secret is empty — skipping ${{ matrix.target }}"
          exit 78  # neutral exit; pairs with continue-on-error for clean "skipped" status

      - name: Create release
        id: create_release
        uses: OctopusDeploy/create-release-action@v3
        with:
          project: ${{ env.PROJECT }}
          release_number: ${{ needs.build.outputs.version }}

      - name: Deploy to Dev
        uses: OctopusDeploy/deploy-release-action@v3
        with:
          project: ${{ env.PROJECT }}
          release_number: ${{ steps.create_release.outputs.release_number }}
          environments: Dev
