name: CI / Build Image

# Builds + pushes the randomquotes image to GHCR. Triggers a release via the
# downstream release.yml workflow_run hook on success. App-only concern —
# changes to .octopus/ or gitops/ don't fire this.
#
# (Note: Octopus's `Octopus.ArgoCDUpdateImageTags` step writes image tags
# into the helm chart values under `gitops/`, which sits outside this
# filter, so the build → release → image-update loop can't form.)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/octopus-iac-lab

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        # Pin a 1.1.x base so we don't collide with 1.0.x tags from earlier
        # workflow incarnations sitting in GHCR. Bump the major prefix
        # whenever this workflow file gets recreated.
        # On PRs, also publish a `pr-N` tag so Argo's preview ApplicationSet
        # can pin to the branch's image (otherwise previews show stale
        # `:latest` from main).
        run: |
          echo "version=1.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_tag=pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: VERSION=${{ steps.version.outputs.version }}

      - name: Build and push (preview)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.pr_tag }}
          build-args: VERSION=${{ steps.version.outputs.pr_tag }}

  # On main, hand the freshly-built image off to release.yml as a callable
  # workflow. Explicit version + sha pass — no GHCR latest-tag-roulette.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.build.outputs.version }}
      sha: ${{ github.sha }}
    secrets: inherit
