# nginx LB for Octopus HA. Two protocols, two stanzas:
#
#   http {}    — UI + REST API (port 80 inside the LB, mapped to 8090 host).
#                WebSocket upgrade headers included for SignalR (live updates
#                in the UI).
#   stream {}  — Halibut polling (10943) and KLOS gRPC (8443) — both raw TCP,
#                round-robin between the two nodes.
#
# Round-robin without sticky sessions is fine: HTTP state is in the DB,
# Halibut connections are long-lived but a tentacle just reconnects if the
# chosen node dies. For UI session affinity in production you'd add
# ip_hash or a cookie-based stickiness module.

events {}

http {
    upstream octopus_http {
        server octopus-1:8080;
        server octopus-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://octopus_http;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SignalR / WebSocket upgrade
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Long-poll / SignalR streams want generous timeouts
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}

stream {
    upstream octopus_halibut {
        server octopus-1:10943;
        server octopus-2:10943;
    }

    server {
        listen     10943;
        proxy_pass octopus_halibut;
    }

    upstream octopus_grpc {
        server octopus-1:8443;
        server octopus-2:8443;
    }

    server {
        listen     8443;
        proxy_pass octopus_grpc;
    }
}
