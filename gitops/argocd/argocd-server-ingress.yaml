# Argo UI Ingress on argocd.localtest.me. Routes through the cluster's
# nginx-ingress (installed by tofu/k8s-agent/) so we reach it through the
# same single port-forward that serves all the tenant apps:
#
#   kubectl port-forward svc/ingress-nginx-controller 8080:8080 -n ingress-nginx
#   open http://argocd.localtest.me:8080
#
# argocd-server runs HTTP-only (configs.params.server.insecure=true on
# the chart, set in tofu/argocd/argocd_install.tf). Pure HTTP ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
