# Ephemeral preview environments — auto-materialised from open PRs in
# this repo. Argo's PullRequest generator polls GitHub for open PRs and
# creates one Argo Application per match. PR merged/closed → Application
# + namespace pruned automatically.
#
# Why PR-based and not branch-based: GitHub's SCM Provider for branches
# only works on *organization* accounts, not user accounts. The
# PullRequest generator hits /repos/{owner}/{repo}/pulls which works
# regardless. It also matches the more common real-world workflow:
# "open a PR, get a preview env to review against".
#
# Cost surface is the ApplicationSet itself: committed once, after that
# `gh pr create` of a `feat/*` branch is the entire create-preview UX.
# Closing/merging the PR tears it down.
#
# Previews use a "preview-inc" pseudo-tenant with a hazard-cone icon and
# a `PREVIEW · #N` watermark so they're unmistakable in the UI.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: randomquotes-previews
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - pullRequest:
        github:
          owner: vlussenburg
          repo: octopus-iac-lab
          tokenRef:
            secretName: github-pat
            key: token
        filters:
          - branchMatch: "^feat/.*"
        requeueAfterSeconds: 60
  template:
    metadata:
      name: 'randomquotes-preview-pr-{{ .number }}'
      annotations:
        # Project + tenant make the preview legible inside Octopus's
        # Argo CD Instances view. Environment is intentionally omitted —
        # there's no "preview" Octopus environment, and that's fine; the
        # preview lives in Argo, not in Octopus's lifecycle graph.
        argo.octopus.com/project: randomquotes
        argo.octopus.com/tenant: preview-inc
      labels:
        lab.octopus.com/role: preview
        lab.octopus.com/pr: '{{ .number }}'
        lab.octopus.com/branch: '{{ .branch_slug }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/vlussenburg/octopus-iac-lab
        # Deploy what's IN the PR's branch, not main. Edits propagate
        # within Argo's sync interval (~3 min default).
        targetRevision: '{{ .branch }}'
        path: gitops/charts/randomquotes
        helm:
          releaseName: randomquotes
          valuesObject:
            replicaCount: 1
            tenant: preview-inc
            mood: comedy
            icon: "🚧"
            brandColor: "#FF6B35"
            watermark: 'PREVIEW · PR #{{ .number }}'
            host: 'argo-preview-pr-{{ .number }}.localtest.me'
            image:
              repository: vlussenburg/octopus-iac-lab
              tag: latest
      destination:
        server: https://kubernetes.default.svc
        namespace: 'argo-randomquotes-preview-pr-{{ .number }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
