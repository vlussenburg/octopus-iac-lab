# Defaults — overridden per-Application via spec.source.helm.valuesObject in
# each leaf under gitops/applications/randomquotes/{local,saas}/. Anything
# left at default here will surface as an unconfigured tenant on the page,
# which is a useful signal when you forget to wire a new App.

image:
  # Full path is "ghcr.io/{{ .Values.image.repository }}:{{ .Values.image.tag }}".
  # Octopus's update-argo-cd-application-image-tags step bumps `tag` and
  # uses the argo.octopus.com/image-replace-paths annotation on each leaf
  # to know where the tag lives in this template.
  repository: vlussenburg/octopus-iac-lab
  # The chart-default tag isn't actually consumed today — every leaf
  # pins image.tag in its spec.source.helm.valuesObject. Keep this as a
  # sentinel so a forgotten override is obvious in the rendered manifest.
  tag: chart-default-do-not-use

replicaCount: 1

# Per-tenant config that ends up in /usr/share/nginx/html/config.json.
tenant: ""
mood: ""
icon: ""
brandColor: ""
watermark: ""

# nginx-ingress host. *.localtest.me resolves to 127.0.0.1, so a single
# port-forward `kubectl port-forward svc/ingress-nginx-controller 8080:8080
# -n ingress-nginx` reaches every tenant's app at its own host.
host: ""

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
