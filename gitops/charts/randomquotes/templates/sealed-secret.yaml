# Encrypted at chart-build time with kubeseal --scope cluster-wide.
# Only the sealed-secrets-controller in this cluster (kube-system) holds
# the private key — anyone reading this YAML in git sees only ciphertext.
# The controller materialises a regular k8s Secret named
# randomquotes-secrets in whichever namespace this chart renders into;
# the Deployment then mounts it as the API_TOKEN env var.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: randomquotes-secrets
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    api-token: 
  template:
    metadata:
      name: randomquotes-secrets
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
    type: Opaque
