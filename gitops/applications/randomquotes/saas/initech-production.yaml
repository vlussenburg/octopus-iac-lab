# GitOps source of truth — Argo CD reconciles to this. Edit + push to update.
# argo.octopus.com/* annotations are claimed by Octopus's Argo CD Gateway
# and surface this Application against the matching project/env/tenant.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: randomquotes-initech-production-saas
  namespace: argocd
  annotations:
    argo.octopus.com/project: randomquotes
    argo.octopus.com/environment: production
    argo.octopus.com/tenant: initech
    # Tells Octopus's update-argo-cd-application-image-tags step where the
    # image reference lives in the helm values, so it can bump the tag
    # without touching anything else.
    argo.octopus.com/image-replace-paths: "ghcr.io/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  labels:
    lab.octopus.com/source: saas
    lab.octopus.com/tenant: initech
spec:
  project: default
  source:
    repoURL: https://github.com/vlussenburg/octopus-iac-lab
    path: gitops/charts/randomquotes
    targetRevision: HEAD
    helm:
      releaseName: randomquotes
      valuesObject:
        replicaCount: 1
        tenant: initech
        mood: stoic
        icon: "🧘"
        brandColor: "#7E57C2"
        watermark: "FREE TIER"
        host: argo-saas-initech-production.localtest.me
        image:
          repository: vlussenburg/octopus-iac-lab
          tag: "1.1.16"
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-randomquotes-saas-initech-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
